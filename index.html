<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camunda Helm Values Generator</title>

  <!--
    Apply the saved theme before React renders to prevent a flash of the
    wrong theme on page load. Must run before any CSS is painted.
  -->
  <script>
    const theme = localStorage.getItem('helm-theme') || 'dark'
    document.documentElement.setAttribute('data-theme', theme)
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
